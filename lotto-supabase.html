<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוטו קבוצתי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8001D; --gold: #FFD700; --dark: #0d0d1a;
    --mid: #13132a; --card: #1a1a35; --light: #0f3460;
    --white: #fff; --gray: #aaaacc; --ball-size: 36px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 10px 60px; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 2.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 24px rgba(255,215,0,0.5); }
  .header .sub { font-size: 0.9rem; color: var(--gray); margin-top: 4px; }
  .date-badge { display: inline-block; background: var(--red); color: white; font-weight: 700; font-size: 0.85rem; padding: 3px 14px; border-radius: 20px; margin-top: 8px; }
  .container { width: 100%; max-width: 700px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .card { background: var(--card); border: 2px solid var(--gold); border-radius: 16px; padding: 28px 22px; text-align: center; box-shadow: 0 0 40px rgba(255,215,0,0.1); margin-bottom: 16px; }
  .card h2 { font-size: 1.3rem; color: var(--gold); margin-bottom: 6px; }
  .card p { color: var(--gray); font-size: 0.85rem; margin-bottom: 18px; }
  .text-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: white; font-family: 'Heebo', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
  .text-input:focus { border-color: var(--gold); }
  .text-input::placeholder { color: rgba(255,255,255,0.25); }
  .btn-gold { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--dark); border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.2s; }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,215,0,0.35); }
  .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .player-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 16px; }
  .player-chip { display: flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; border: 1.5px solid; }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; }
  .user-bar { display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.07); }
  .user-info { display: flex; align-items: center; gap: 9px; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; font-weight: 900; }
  .user-name { font-weight: 700; font-size: 0.95rem; }
  .user-rows { font-size: 0.72rem; color: var(--gray); }
  .btn-sm { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); color: var(--gray); border-radius: 8px; padding: 5px 11px; font-family: 'Heebo', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { background: rgba(255,255,255,0.13); color: white; }
  .actions { display: flex; gap: 9px; margin-bottom: 14px; }
  .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-family: 'Heebo', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-quick { background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--dark); }
  .btn-quick:hover { transform: translateY(-1px); }
  .btn-clear { background: rgba(255,255,255,0.07); color: var(--white); border: 1px solid rgba(255,255,255,0.13); }
  .btn-refresh { background: rgba(255,255,255,0.05); color: var(--gray); border: 1px solid rgba(255,255,255,0.1); }
  .btn-refresh:hover { background: rgba(255,255,255,0.1); color: white; }
  .section-label { font-size: 0.78rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
  .legend { display: flex; gap: 12px; font-size: 0.72rem; color: var(--gray); margin-bottom: 9px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; }
  .lotto-table { background: var(--mid); border: 2px solid var(--gold); border-radius: 12px; overflow: hidden; margin-bottom: 18px; box-shadow: 0 0 24px rgba(255,215,0,0.1); }
  .table-header { background: linear-gradient(135deg, var(--red), #8B0000); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
  .table-header .title { font-size: 1rem; font-weight: 900; color: var(--gold); }
  .table-header .price { font-size: 0.8rem; color: rgba(255,255,255,0.9); }
  .rows-wrapper { padding: 12px; display: flex; flex-direction: column; gap: 9px; }
  .lotto-row { display: flex; flex-direction: column; gap: 6px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10px; border: 1.5px solid rgba(255,255,255,0.07); transition: all 0.2s; }
  .lotto-row.mine { border-color: rgba(255,215,0,0.25); background: rgba(255,215,0,0.03); }
  .lotto-row.taken { opacity: 0.55; pointer-events: none; }
  .row-header { display: flex; align-items: center; justify-content: space-between; }
  .row-label { font-weight: 700; font-size: 0.83rem; color: var(--gold); }
  .row-owner { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; border: 1px solid; }
  .claim-btn { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); color: rgba(255,215,0,0.8); border-radius: 8px; padding: 3px 10px; font-family: 'Heebo', sans-serif; font-size: 0.7rem; cursor: pointer; }
  .claim-btn:hover { background: rgba(255,215,0,0.2); }
  .balls-container { display: flex; flex-wrap: wrap; gap: 4px; }
  .ball { width: var(--ball-size); height: var(--ball-size); border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); background: var(--light); display: flex; align-items: center; justify-content: center; font-size: 0.73rem; font-weight: 700; cursor: pointer; transition: all 0.13s; user-select: none; color: var(--gray); flex-shrink: 0; }
  .ball:hover { border-color: var(--gold); color: var(--gold); transform: scale(1.1); }
  .ball.selected { border-color: transparent; color: white; box-shadow: 0 0 8px rgba(232,0,29,0.5); transform: scale(1.04); }
  .ball.strong { border-color: rgba(255,215,0,0.3); color: var(--gold); }
  .ball.strong:hover { border-color: var(--gold); }
  .ball.strong.selected { background: var(--gold) !important; border-color: var(--gold); color: var(--dark); box-shadow: 0 0 9px rgba(255,215,0,0.55); }
  .sub-label { font-size: 0.66rem; color: rgba(255,255,255,0.32); margin-bottom: 1px; }
  .sub-label.strong-lbl { color: rgba(255,215,0,0.4); margin-top: 5px; }
  .summary-box { background: var(--mid); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; padding: 15px 16px; margin-bottom: 18px; }
  .summary-title { font-size: 0.95rem; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
  .summary-player-section { margin-bottom: 12px; }
  .summary-player-header { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; font-weight: 700; margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .summary-player-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .summary-line { display: flex; align-items: center; gap: 6px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; }
  .summary-line:last-child { border-bottom: none; }
  .summary-row-label { font-size: 0.76rem; font-weight: 700; color: var(--gray); min-width: 50px; flex-shrink: 0; }
  .summary-nums { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .sball { width: 25px; height: 25px; border-radius: 50%; font-size: 0.66rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sball.empty { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.2); border: 1px dashed rgba(255,255,255,0.14); }
  .sball.strong-ball { color: var(--dark); background: var(--gold); }
  .sball.strong-empty { background: rgba(255,215,0,0.07); color: rgba(255,215,0,0.22); border: 1px dashed rgba(255,215,0,0.18); }
  .summary-sep { width: 1px; height: 17px; background: rgba(255,255,255,0.13); flex-shrink: 0; }
  .summary-total { border-top: 1px solid rgba(255,255,255,0.09); margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 700; }
  .summary-total .val { color: var(--gold); }
  .empty-msg { font-size: 0.8rem; color: rgba(255,255,255,0.28); padding: 8px 0; }
  .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--red), #8B0000); color: white; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 1.05rem; font-weight: 900; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 18px rgba(232,0,29,0.32); }
  .btn-submit:hover { transform: translateY(-2px); }
  .btn-submit:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: var(--dark); font-weight: 700; padding: 10px 24px; border-radius: 28px; font-size: 0.92rem; transition: transform 0.3s ease; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🎱 לוטו קבוצתי</h1>
  <div class="sub">כל אחד ממלא את השורות שלו</div>
  <div class="date-badge">הגרלה: יום ראשון 17.05.2026</div>
</div>

<div class="container">

  <div class="screen active" id="screenName">
    <div class="card">
      <h2>👋 מי אתה?</h2>
      <p>הכנס את שמך כדי להצטרף לטופס הקבוצתי</p>
      <div id="playerChips" class="player-chips"></div>
      <input class="text-input" id="nameInput" type="text" placeholder="שמך / כינויך" maxlength="16" />
      <button class="btn-gold" id="joinBtn" onclick="joinGame()" disabled>🎯 כניסה לטופס</button>
    </div>
  </div>

  <div class="screen" id="screenApp">
    <div class="user-bar">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar"></div>
        <div>
          <div class="user-name" id="userNameDisplay"></div>
          <div class="user-rows" id="userRowsDisplay">טרם בחרת שורות</div>
        </div>
      </div>
      <button class="btn-sm" onclick="switchUser()">🔄 החלף</button>
    </div>

    <div class="actions">
      <button class="btn btn-quick" onclick="quickPickMyRows()">🎲 מלא שורותי</button>
      <button class="btn btn-clear" onclick="clearMyRows()">🗑️ נקה</button>
      <button class="btn btn-refresh" onclick="refreshAll()">🔃 רענן</button>
    </div>

    <div class="legend" id="legendEl"></div>
    <div class="section-label">טופס לוטו — 14 שורות</div>

    <div class="lotto-table">
      <div class="table-header">
        <span class="title">🎯 לוטו קבוצתי — 14 שורות</span>
        <span class="price">מחיר: ₪28</span>
      </div>
      <div class="rows-wrapper" id="rowsContainer"></div>
    </div>

    <div class="summary-box">
      <div class="summary-title">📋 סיכום קבוצתי</div>
      <div id="summaryContent"></div>
      <div class="summary-total">
        <span>סה״כ לתשלום</span><span class="val">₪28</span>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()" disabled>
      🎫 שלח טופס להגרלה
    </button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  const SB_URL = 'https://nhhuqenksoayehzcpfqq.supabase.co';
  const SB_KEY = 'sb_publishable_vIIkond3YgAuAM-k-Kw_bw_tx7XfQer';
  const ROWS = 14, MAIN_COUNT = 37, STRONG_COUNT = 7, NEED_MAIN = 6, NEED_STRONG = 1;

  const COLORS = [
    { bg: '#E8001D', text: '#fff' }, { bg: '#2196F3', text: '#fff' },
    { bg: '#4CAF50', text: '#fff' }, { bg: '#FF9800', text: '#fff' },
    { bg: '#9C27B0', text: '#fff' }, { bg: '#00BCD4', text: '#fff' },
    { bg: '#FF5722', text: '#fff' }, { bg: '#8BC34A', text: '#fff' },
  ];

  let currentUser = null, players = [], rows = [];

  async function api(path, opts = {}) {
    const res = await fetch(SB_URL + '/rest/v1/' + path, {
      ...opts,
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...(opts.headers || {}) }
    });
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function loadRows() { rows = await api('lotto_rows?order=row_index'); }
  async function loadPlayers() { players = await api('lotto_players?order=id'); }

  async function saveRow(r) {
    const row = rows[r];
    await api('lotto_rows?row_index=eq.' + r, { method: 'PATCH', body: JSON.stringify({ owner: row.owner, main_numbers: row.main_numbers, strong_number: row.strong_number }) });
  }

  async function savePlayer(p) {
    await api('lotto_players?on_conflict=name', { method: 'POST', headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' }, body: JSON.stringify(p) });
  }

  const getColor = idx => COLORS[idx % COLORS.length];
  const getMain = row => row.main_numbers ? row.main_numbers.split(',').map(Number).filter(Boolean) : [];
  const getStrong = row => row.strong_number || null;
  const playerColor = name => { const p = players.find(p => p.name === name); return p ? getColor(p.color_idx) : { bg: '#888', text: '#fff' }; };

  // NAME SCREEN
  const nameInput = document.getElementById('nameInput');
  const joinBtn = document.getElementById('joinBtn');
  nameInput.addEventListener('input', () => { joinBtn.disabled = nameInput.value.trim().length < 2; });
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

  async function init() {
    await loadPlayers();
    await loadRows();
    renderChips();
  }

  function renderChips() {
    document.getElementById('playerChips').innerHTML = players.map(p => {
      const c = getColor(p.color_idx);
      return `<div class="player-chip" style="background:${c.bg}22;border-color:${c.bg};color:${c.bg}"><div class="chip-dot" style="background:${c.bg}"></div>${p.name}</div>`;
    }).join('');
  }

  async function joinGame() {
    const name = nameInput.value.trim();
    if (name.length < 2) return;
    joinBtn.disabled = true;
    joinBtn.textContent = '⏳ מתחבר...';
    let p = players.find(x => x.name.toLowerCase() === name.toLowerCase());
    if (!p) {
      p = { name, color_idx: players.length % COLORS.length };
      await savePlayer(p);
      await loadPlayers();
      p = players.find(x => x.name.toLowerCase() === name.toLowerCase()) || p;
    }
    currentUser = p;
    show('screenApp');
    buildLegend(); buildRows(); updateSummary(); updateUserBar();
  }

  function switchUser() {
    currentUser = null;
    nameInput.value = ''; joinBtn.disabled = true; joinBtn.textContent = '🎯 כניסה לטופס';
    renderChips(); show('screenName');
  }

  function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

  function updateUserBar() {
    const c = getColor(currentUser.color_idx);
    const av = document.getElementById('userAvatar');
    av.textContent = currentUser.name[0].toUpperCase();
    av.style.cssText = `width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;background:${c.bg};color:${c.text}`;
    document.getElementById('userNameDisplay').textContent = currentUser.name;
    const myRows = rows.filter(r => r.owner === currentUser.name);
    const complete = myRows.filter(r => getMain(r).length === NEED_MAIN && getStrong(r)).length;
    document.getElementById('userRowsDisplay').textContent = myRows.length === 0 ? 'טרם בחרת שורות' : `${myRows.length} שורות (${complete} מלאות)`;
  }

  function buildLegend() {
    document.getElementById('legendEl').innerHTML = players.map(p => {
      const c = getColor(p.color_idx);
      return `<div class="legend-item"><div class="legend-dot" style="background:${c.bg}"></div><span>${p.name}</span></div>`;
    }).join('') + `<div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.15);border:1px dashed rgba(255,255,255,0.3)"></div><span>פנוי</span></div>`;
  }

  function buildRows() {
    const container = document.getElementById('rowsContainer');
    container.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      const row = rows[r] || { row_index: r, owner: null, main_numbers: '', strong_number: null };
      const isMyRow = row.owner === currentUser.name;
      const isFree = !row.owner;
      const ownerColor = row.owner ? playerColor(row.owner) : null;
      const mainNums = getMain(row);
      const strongNum = getStrong(row);

      const rowEl = document.createElement('div');
      rowEl.className = 'lotto-row' + (isMyRow ? ' mine' : '') + (!isFree && !isMyRow ? ' taken' : '');
      if (isMyRow && ownerColor) rowEl.style.borderColor = ownerColor.bg + '44';

      const header = document.createElement('div');
      header.className = 'row-header';
      header.innerHTML = `<div class="row-label">שורה ${r + 1}</div>`;

      if (row.owner) {
        const badge = document.createElement('div');
        badge.className = 'row-owner';
        badge.textContent = row.owner;
        badge.style.cssText = `background:${ownerColor.bg}22;border-color:${ownerColor.bg};color:${ownerColor.bg}`;
        header.appendChild(badge);
      } else {
        const cb = document.createElement('button');
        cb.className = 'claim-btn';
        cb.textContent = '+ קח שורה זו';
        cb.onclick = () => claimRow(r);
        header.appendChild(cb);
      }
      rowEl.appendChild(header);

      rowEl.innerHTML += `<div class="sub-label">בחר 6 מספרים (1–37)</div>`;
      const mainBalls = document.createElement('div');
      mainBalls.className = 'balls-container';
      for (let n = 1; n <= MAIN_COUNT; n++) {
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.textContent = n;
        if (mainNums.includes(n)) { ball.classList.add('selected'); ball.style.background = ownerColor ? ownerColor.bg : 'var(--red)'; }
        if (isMyRow) ball.onclick = () => toggleMain(r, n, ball);
        mainBalls.appendChild(ball);
      }
      rowEl.appendChild(mainBalls);

      rowEl.innerHTML += `<div class="sub-label strong-lbl">⭐ מספר חזק (1–7)</div>`;
      const strongBalls = document.createElement('div');
      strongBalls.className = 'balls-container';
      for (let n = 1; n <= STRONG_COUNT; n++) {
        const ball = document.createElement('div');
        ball.className = 'ball strong';
        ball.textContent = n;
        if (strongNum === n) ball.classList.add('selected');
        if (isMyRow) ball.onclick = () => toggleStrong(r, n);
        strongBalls.appendChild(ball);
      }
      rowEl.appendChild(strongBalls);
      container.appendChild(rowEl);
    }
  }

  async function claimRow(r) {
    if (rows[r].owner) return;
    rows[r].owner = currentUser.name; rows[r].main_numbers = ''; rows[r].strong_number = null;
    await saveRow(r); buildRows(); updateSummary(); updateUserBar();
  }

  async function toggleMain(r, n, el) {
    let main = getMain(rows[r]);
    if (main.includes(n)) { main = main.filter(x => x !== n); el.classList.remove('selected'); el.style.background = ''; }
    else {
      if (main.length >= NEED_MAIN) { showToast('כבר בחרת 6 מספרים!'); return; }
      main.push(n); el.classList.add('selected'); el.style.background = getColor(currentUser.color_idx).bg;
    }
    rows[r].main_numbers = main.join(',');
    await saveRow(r); updateSummary(); updateUserBar();
  }

  async function toggleStrong(r, n) {
    const cur = getStrong(rows[r]);
    rows[r].strong_number = (cur === n) ? null : n;
    await saveRow(r); buildRows(); updateSummary(); updateUserBar();
  }

  function updateSummary() {
    const container = document.getElementById('summaryContent');
    container.innerHTML = '';
    let allDone = true, anyRows = false;

    players.forEach(player => {
      const playerRows = rows.map((r, i) => ({ ...r, idx: i })).filter(r => r.owner === player.name);
      if (!playerRows.length) return;
      anyRows = true;
      const c = getColor(player.color_idx);
      const section = document.createElement('div');
      section.className = 'summary-player-section';
      section.innerHTML = `<div class="summary-player-header"><div class="summary-player-dot" style="background:${c.bg}"></div><span style="color:${c.bg}">${player.name}</span><span style="color:var(--gray);font-weight:400;font-size:.75rem">(${playerRows.length} שורות)</span></div>`;

      playerRows.forEach(row => {
        const main = getMain(row), strong = getStrong(row);
        if (main.length < NEED_MAIN || !strong) allDone = false;
        const line = document.createElement('div');
        line.className = 'summary-line';
        line.innerHTML = `<div class="summary-row-label">שורה ${row.idx + 1}</div>`;
        const numsDiv = document.createElement('div');
        numsDiv.className = 'summary-nums';
        [...main].sort((a, b) => a - b).forEach((n, i) => {
          numsDiv.innerHTML += `<div class="sball" style="background:${c.bg};color:${c.text}">${n}</div>`;
        });
        for (let i = main.length; i < NEED_MAIN; i++) numsDiv.innerHTML += `<div class="sball empty">?</div>`;
        numsDiv.innerHTML += `<div class="summary-sep"></div>`;
        numsDiv.innerHTML += strong ? `<div class="sball strong-ball">${strong}</div>` : `<div class="sball strong-empty">★</div>`;
        line.appendChild(numsDiv);
        section.appendChild(line);
      });
      container.appendChild(section);
    });

    const freeCount = rows.filter(r => !r.owner).length;
    if (freeCount > 0) { container.innerHTML += `<div class="empty-msg">${freeCount} שורות פנויות</div>`; allDone = false; }
    if (!anyRows) { container.innerHTML = '<div class="empty-msg">טרם נבחרו שורות — לחץ "+ קח שורה זו"</div>'; allDone = false; }
    document.getElementById('submitBtn').disabled = !allDone;
  }

  async function quickPickMyRows() {
    const myRows = rows.filter(r => r.owner === currentUser.name);
    if (!myRows.length) { showToast('קודם תבע שורה אחת לפחות!'); return; }
    for (const row of myRows) {
      const mp = shuffle(Array.from({ length: MAIN_COUNT }, (_, i) => i + 1));
      row.main_numbers = mp.slice(0, NEED_MAIN).join(',');
      row.strong_number = Math.floor(Math.random() * STRONG_COUNT) + 1;
      await saveRow(row.row_index);
    }
    buildRows(); updateSummary(); updateUserBar(); showToast('מספרים נבחרו אוטומטית! 🎲');
  }

  async function clearMyRows() {
    for (const row of rows.filter(r => r.owner === currentUser.name)) {
      row.main_numbers = ''; row.strong_number = null; await saveRow(row.row_index);
    }
    buildRows(); updateSummary(); updateUserBar();
  }

  async function refreshAll() {
    showToast('מרענן...');
    await loadPlayers(); await loadRows();
    buildLegend(); buildRows(); updateSummary(); updateUserBar();
    showToast('עודכן! ✅');
  }

  function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
  function submitForm() { showToast('✅ הטופס נשלח! בהצלחה לכולם! 🍀'); }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

  init();
</script>
</body>
